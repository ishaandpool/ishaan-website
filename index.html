  function bind(id, key){
    const el = document.getElementById(id);
    if(!el) return;
    const on  = e => { e.preventDefault(); K[key]=true;  el.classList.add('pressed');    };
    const off = e => { e.preventDefault(); K[key]=false; el.classList.remove('pressed'); };
    el.addEventListener('touchstart',  on,  {passive:false});
    el.addEventListener('touchend',    off, {passive:false});
    el.addEventListener('touchcancel', off, {passive:false});
    el.addEventListener('mousedown',   on);
    el.addEventListener('mouseup',     off);
    el.addEventListener('mouseleave',  off);
  }
  window._bindMobile = function(){
    bind('btn-left',  'ArrowLeft');
    bind('btn-right', 'ArrowRight');
    bind('btn-jump',  'ArrowUp');

})();

const P = { x:60, y:380, vx:0, vy:0, w:14, h:22, ground:false, dir:1, frame:0, ft:0 };
const GRAV=0.50, SPD=5.0, JMP=-11.5, FRIC=0.76;

function resetP(x,y) { P.x=x;P.y=y;P.vx=0;P.vy=0;P.ground=false;P.dir=1;P.frame=0;P.ft=0; }

function physicsStep(platforms, clampL=true, clampR=true) {
  const L=K['ArrowLeft']||K['KeyA'], R=K['ArrowRight']||K['KeyD'];
  const J=K['ArrowUp']||K['KeyW']||K['Space'];
  if(L){P.vx=Math.max(P.vx-1.7,-SPD);P.dir=-1;}
  if(R){P.vx=Math.min(P.vx+1.7, SPD);P.dir= 1;}
  P.vx*=FRIC; if(Math.abs(P.vx)<0.06)P.vx=0;
  P.x+=P.vx;
  if(clampL&&P.x<0){P.x=0;P.vx=0;}
  if(clampR&&P.x+P.w>W){P.x=W-P.w;P.vx=0;}
  P.vy+=GRAV; P.y+=P.vy; P.ground=false;
  for(const pl of platforms){
    const prevB=P.y+P.h-P.vy;
    if(P.x+P.w>pl.x&&P.x<pl.x+pl.w&&P.y+P.h>=pl.y&&prevB<=pl.y+6&&P.vy>=0){
      P.y=pl.y-P.h;
      if(pl.boostV){ P.vy=pl.boostV; P.ground=false; }
      else { P.vy=0; P.ground=true; }
    }
  }
  if(P.y<0){P.y=0;if(P.vy<0)P.vy=0;}
  if(J&&P.ground){P.vy=JMP;P.ground=false;}
  if(Math.abs(P.vx)>0.5&&P.ground){P.ft++;if(P.ft>7){P.frame=(P.frame+1)%4;P.ft=0;}}
  else P.frame=0;
}

function gl(c,b=14){ ctx.shadowColor=c; ctx.shadowBlur=b; }
function ngl(){ ctx.shadowBlur=0; }

function drawGrid(col){
  ctx.strokeStyle=col; ctx.lineWidth=0.4;
  for(let x=0;x<W;x+=45){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,H);ctx.stroke();}
  for(let y=0;y<H;y+=45){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(W,y);ctx.stroke();}
}

function drawBg(accent){
  ctx.fillStyle='#060608'; ctx.fillRect(0,0,W,H);
  drawGrid(accent+'12');
  const vg=ctx.createRadialGradient(W/2,H/2,50,W/2,H/2,W*.72);
  vg.addColorStop(0,'transparent'); vg.addColorStop(1,'rgba(0,0,0,.7)');
  ctx.fillStyle=vg; ctx.fillRect(0,0,W,H);
}

function drawCardPlatform(pl, accent) {
  const a2=pl.accent||accent, CARD_H=60, PAD=8, cY=pl.y-CARD_H;
  ctx.save(); gl(a2,8);
  ctx.strokeStyle=a2; ctx.lineWidth=1;
  ctx.fillStyle='rgba(7,8,10,0.94)';
  ctx.beginPath(); ctx.roundRect(pl.x,cY,pl.w,CARD_H,3); ctx.fill(); ctx.stroke();
  ngl();
  ctx.textAlign='left';
  ctx.fillStyle=a2; ctx.font='bold 9px monospace';
  ctx.fillText(pl.label,pl.x+PAD,cY+14);
  if(pl.org){ ctx.fillStyle='#777'; ctx.font='8px monospace'; ctx.fillText(pl.org,pl.x+PAD,cY+27); }
  if(pl.date){ ctx.textAlign='right'; ctx.fillStyle='#444'; ctx.font='7.5px monospace';
    ctx.fillText(pl.date,pl.x+pl.w-PAD,cY+14); ctx.textAlign='left'; }
  if(pl.detail){
    ctx.fillStyle='#4a4a4a'; ctx.font='7.5px monospace';
    const preview=pl.detail.length>52?pl.detail.slice(0,52)+'…':pl.detail;
    ctx.fillText(preview,pl.x+PAD,cY+40);
    ctx.fillText(pl.url ? '↑ stand here · click to open →' : '↑ stand here to read full',pl.x+PAD,cY+52);
  }
  gl(a2,12); ctx.fillStyle=a2;
  ctx.fillRect(pl.x,pl.y,pl.w,pl.h); ngl(); ctx.restore();
}

function drawFloorPlatform(pl){
  ctx.fillStyle='rgba(25,25,30,0.92)'; ctx.fillRect(pl.x,pl.y,pl.w,pl.h);
  ctx.fillStyle='#2a2a32'; ctx.fillRect(pl.x,pl.y,pl.w,1);
}

function drawSkillPlatform(pl,accent){
  ctx.save(); gl(accent,10);
  ctx.fillStyle=accent+'22'; ctx.fillRect(pl.x,pl.y-24,pl.w,24);
  ctx.strokeStyle=accent; ctx.lineWidth=1; ctx.strokeRect(pl.x,pl.y-24,pl.w,24);
  ctx.fillStyle=accent; ctx.font='bold 8.5px monospace'; ctx.textAlign='center';
  ctx.fillText(pl.label,pl.x+pl.w/2,pl.y-9); ngl();
  ctx.fillStyle=accent; ctx.fillRect(pl.x,pl.y,pl.w,pl.h); ctx.restore();
}

function drawPlatform(pl,accent){
  if(!pl.label&&!pl.detail) drawFloorPlatform(pl);
  else if(pl.detail) drawCardPlatform(pl,accent);
  else drawSkillPlatform(pl,accent);
}

function drawEnemy(en){
  if(!en.alive) return;
  if(en.iframes>0 && Math.floor(en.iframes/5)%2===0) return;
  ctx.save(); gl('#ef4444',10);
  ctx.fillStyle='#ef4444'; ctx.fillRect(en.x,en.y,en.w,en.h);
  // eyes
  ctx.fillStyle='#111';
  ctx.fillRect(en.x+3,en.y+5,3,3); ctx.fillRect(en.x+12,en.y+5,3,3);
  // spikes
  ctx.fillStyle='#ef4444';
  for(let i=0;i<3;i++){
    ctx.beginPath();
    ctx.moveTo(en.x+2+i*6,en.y);
    ctx.lineTo(en.x+5+i*6,en.y-7);
    ctx.lineTo(en.x+8+i*6,en.y);
    ctx.fill();
  }
  ngl(); ctx.restore();
}

  ctx.fillStyle='#F7374F'; ctx.fillRect(-8,10,3,6); ctx.fillRect(5,10,3,6);
  const lv=P.ground?[0,-3,0,3][P.frame]:0;

function drawInfoCard(card,accent){
  if(!card||!card.detail) return;
  const a2=card.accent||accent;
  const POPUP_W=Math.min(380,W-20), POPUP_H=88;
  const px2=Math.min(Math.max(card.x+card.w/2-POPUP_W/2,6),W-POPUP_W-6);
  const py2=Math.max(card.y-60-POPUP_H-10,6);
  ctx.save(); gl(a2,24); ctx.strokeStyle=a2; ctx.lineWidth=1.5;
  ctx.fillStyle='rgba(3,4,6,0.98)';
  ctx.beginPath(); ctx.roundRect(px2,py2,POPUP_W,POPUP_H,6); ctx.fill(); ctx.stroke(); ngl();
  ctx.textAlign='left';
  ctx.fillStyle=a2; ctx.font='bold 11px monospace'; ctx.fillText(card.label||'',px2+12,py2+20);
  if(card.org){ ctx.fillStyle='#777'; ctx.font='9px monospace'; ctx.fillText(card.org,px2+12,py2+35); }
  if(card.date){ ctx.textAlign='right'; ctx.fillStyle='#444'; ctx.font='8.5px monospace'; ctx.fillText(card.date,px2+POPUP_W-10,py2+20); }
  if(card.detail){
    ctx.fillStyle='#aaa'; ctx.font='9.5px monospace'; ctx.textAlign='left';
    const words=card.detail.split(' ');
    let line='',lines=[],maxW=POPUP_W-24;
    for(const w of words){
      const test=line+(line?' ':'')+w;
      ctx.font='9.5px monospace';
      if(ctx.measureText(test).width>maxW){lines.push(line);line=w;} else line=test;
    }
    lines.push(line);
    lines.slice(0,3).forEach((l,i)=>ctx.fillText(l,px2+12,py2+53+i*16));
    if(lines.length>3){ctx.fillStyle='#444'; ctx.fillText('...',px2+12,py2+53+3*16);}
  }
  if(card.url){
    ctx.textAlign='right'; ctx.fillStyle=a2+'88'; ctx.font='8px monospace';
    ctx.fillText('click card to open →',px2+POPUP_W-10,py2+POPUP_H-6);
  }
  ctx.restore();
}

function drawProgressBar(){
  const n=ALL_ROOMS.length, barW=72, gap=6;
  const total=n*barW+(n-1)*gap, sx=(W-total)/2;
  for(let i=0;i<n;i++){
    const r=ALL_ROOMS[i], rx=sx+i*(barW+gap), act=r.id===curRoom;
    ctx.save();
    if(act){gl(r.accent,10); ctx.fillStyle=r.accent+'dd';}
    else if(ROOM_IDS.indexOf(curRoom)>i){ctx.fillStyle=r.accent+'44';}
    else{ctx.fillStyle='#161618';}
    ctx.fillRect(rx,H-18,barW,6);
    if(act){
      ctx.fillStyle=r.accent; ctx.font='bold 7px monospace'; ctx.textAlign='center';
      ctx.fillText(r.name.slice(0,9),rx+barW/2,H-5);
    }
    ngl(); ctx.restore();
  }
}

// ══════════════════════════════════════════════════════════════ TICK ════════
function tick(){
  const rm=ROOM_MAP[curRoom];
  const curIdx=ROOM_IDS.indexOf(curRoom);
  const hasNext=curIdx<ROOM_IDS.length-1;
  const hasPrev=curIdx>0;

  physicsStep(rm.platforms,!hasPrev,!hasNext);

  if(alpha>0.95&&!transTo&&!showEnd){
    if(P.x+P.w>=W-3&&hasNext){ transTo=ROOM_IDS[curIdx+1]; transX=60; }
    else if(P.x<=3&&hasPrev){ transTo=ROOM_IDS[curIdx-1]; transX=W-P.w-60; }
    else if(P.x+P.w>=W-3&&!hasNext){ showEnd=true; document.getElementById('end-overlay').classList.add('show'); }
  }

  activeCard=null;
  for(const pl of rm.platforms){
    if(!pl.label&&!pl.detail) continue;
    if(P.ground&&P.x+P.w>pl.x&&P.x<pl.x+pl.w&&Math.abs(P.y+P.h-pl.y)<3) activeCard=pl;
  }
}

function tickPlayground(){
  // Physics (no clamping — we handle world bounds manually)
  physicsStep(PG_PLATFORMS, false, false);
  if(P.x<0){P.x=0;P.vx=0;}
  if(P.x+P.w>PG_W){P.x=PG_W-P.w;P.vx=0;}

  // Flight: hold Space in air to float
  const J=K['ArrowUp']||K['KeyW']||K['Space'];
  if(pg.hasFlight&&J&&!P.ground){ P.vy=Math.max(P.vy-0.55,-3.5); }

  // Fell in a gap — respawn
  if(P.y>H+30){
    pg.health=Math.max(pg.health-1,0);
    pg.invFrames=80;
    P.x=pg.lastSafeX; P.y=pg.lastSafeY-40; P.vx=0; P.vy=0;
    if(pg.health<=0){ pg.health=3; P.x=80; P.y=380; pg.camX=0; pg.lastSafeX=80; pg.lastSafeY=438; }
  }

  // Track last safe ground pos
  if(P.ground){ pg.lastSafeX=P.x; pg.lastSafeY=P.y+P.h; }

  // Camera
  pg.camX=Math.max(0,Math.min(P.x+P.w/2-W/2,PG_W-W));

  // Back to hobbies at left edge
  if(!transTo&&P.x<=5&&pg.camX<=0){
    transTo='hobbies'; transX=W-P.w-60; return;
  }

  // Victory
  if(!pg.victory&&P.x>4720){
    pg.victory=true; showEnd=true;
    document.getElementById('end-overlay').classList.add('show');
  }

  // Collectibles
  for(const c of pg.collectibles){
    if(c.col) continue;
    if(P.x+P.w>c.x&&P.x<c.x+c.w&&P.y+P.h>c.y&&P.y<c.y+c.h){
      c.col=true;
      if(c.type==='wings') pg.hasFlight=true;
      else if(c.type==='weapon') pg.hasWeapon=true;
    }
  }

  // Invincibility countdown
  if(pg.invFrames>0) pg.invFrames--;

  // Enemies
  for(const en of pg.enemies){
    if(!en.alive) continue;
    en.x+=en.vx;
    if(en.x<=en.minX){en.x=en.minX; en.vx=Math.abs(en.vx);}
    if(en.x+en.w>=en.maxX){en.x=en.maxX-en.w; en.vx=-Math.abs(en.vx);}
    if(en.iframes>0) en.iframes--;

    // Player hit
    if(pg.invFrames<=0){
      if(P.x+P.w>en.x&&P.x<en.x+en.w&&P.y+P.h>en.y&&P.y<en.y+en.h){
        pg.health=Math.max(pg.health-1,0);
        pg.invFrames=90;
        pg.hasWeapon=false;
        P.vy=-8; P.vx=(P.x<en.x+en.w/2)?-6:6;
        if(pg.health<=0){
          pg.health=3;
          P.x=pg.lastSafeX; P.y=pg.lastSafeY-40; P.vx=0; P.vy=0;
        }
      }
    }
  }

  // Fire weapon (X key)
  if(K['KeyX']&&pg.hasWeapon&&!pg._fireCD){
    pg.projectiles.push({x:P.x+(P.dir>0?P.w:-6), y:P.y+P.h/2-3, w:14, h:6, vx:P.dir*13, life:65});
    pg._fireCD=14;
  }
  if(pg._fireCD>0) pg._fireCD--;

  // Projectiles
  for(let i=pg.projectiles.length-1;i>=0;i--){
    const proj=pg.projectiles[i];
    proj.x+=proj.vx; proj.life--;
    if(proj.life<=0){pg.projectiles.splice(i,1); continue;}
    let hit=false;
    for(const en of pg.enemies){
      if(!en.alive) continue;
      if(proj.x+proj.w>en.x&&proj.x<en.x+en.w&&proj.y+proj.h>en.y&&proj.y<en.y+en.h){
        en.alive=false; hit=true;
        for(let j=0;j<10;j++){
          pg.particles.push({
            x:en.x+en.w/2, y:en.y+en.h/2,
            vx:(Math.random()-0.5)*7, vy:(Math.random()-0.5)*7-2,
            life:40, col:'#ef4444'
          });
        }
        break;
      }
    }
    if(hit) pg.projectiles.splice(i,1);
  }

  // Particles
  for(let i=pg.particles.length-1;i>=0;i--){
    const p=pg.particles[i];
    p.x+=p.vx; p.y+=p.vy; p.vy+=0.22; p.life--;
    if(p.life<=0) pg.particles.splice(i,1);
  }
}

// ══════════════════════════════════════════════════════════════ PLAYGROUND DRAW ══
function drawPlayground(){
  const acc='#ec4899';
  drawBg(acc);
  drawWatermark('PLAYGROUND',acc);

  ctx.save();
  ctx.translate(-pg.camX,0);

  // Platforms
  for(const pl of PG_PLATFORMS){
    if(pl.x+pl.w<pg.camX-20||pl.x>pg.camX+W+20) continue;
    drawPgPlatform(pl);
  }

  // World text labels
  ctx.font='bold 8px monospace'; ctx.textAlign='center';
  for(const t of PG_TEXTS){
    if(t.x<pg.camX-80||t.x>pg.camX+W+80) continue;
    ctx.fillStyle=t.col;
    ctx.fillText(t.txt,t.x,t.y);
  }

  // Collectibles
  for(const c of pg.collectibles){
    if(!c.col) drawPgCollectible(c);
  }

  // Enemies
  for(const en of pg.enemies){
    if(en.x+en.w<pg.camX-20||en.x>pg.camX+W+20) continue;
    drawEnemy(en);
  }

  // Projectiles
  for(const proj of pg.projectiles){
    ctx.save(); gl('#f59e0b',10);
    ctx.fillStyle='#f59e0b';
    ctx.fillRect(proj.x,proj.y,proj.w,proj.h);
    ngl(); ctx.restore();
  }

  // Particles
  for(const p of pg.particles){
    ctx.globalAlpha=p.life/40;
    ctx.fillStyle=p.col;
    ctx.fillRect(p.x-3,p.y-3,6,6);
  }
  ctx.globalAlpha=1;

  // Player
  drawPlayer();

  ctx.restore();

  // Screen-space HUD
  drawPgHud();
  drawProgressBar();

  // Invincibility flash
  if(pg.invFrames>0&&Math.floor(pg.invFrames/6)%2===0){
    ctx.fillStyle='rgba(239,68,68,0.10)'; ctx.fillRect(0,0,W,H);
  }
}

// ══════════════════════════════════════════════════════════════ LOOP ════════
function loop(){
  requestAnimationFrame(loop);

  if(transTo){
    alpha=Math.max(alpha-0.07,0);
    if(alpha<=0){
      curRoom=transTo; resetP(transX,380); transTo=null; activeCard=null;
      if(curRoom==='playground') resetPlayground();
    }
  } else if(!showEnd){
    alpha=Math.min(alpha+0.05,1);
    if(alpha>0.05){
      if(curRoom==='playground') tickPlayground();
      else tick();
    }
  }

  // Scale everything to fill the viewport
  ctx.save();
  ctx.scale(C.width/W, C.height/H);

  if(curRoom==='playground'){
    drawPlayground();
  } else {
    const rm=ROOM_MAP[curRoom];
    drawBg(rm.accent);
    drawWatermark(rm.name,rm.accent);
    for(const pl of rm.platforms) drawPlatform(pl,rm.accent);
    drawEdgeArrow();
    for(const o of rm.overlays) drawOverlay(o);
    drawPlayer();
    drawInfoCard(activeCard,rm.accent);
    if(activeCard){
      ctx.save(); gl(activeCard.accent||rm.accent,30);
      ctx.strokeStyle=activeCard.accent||rm.accent; ctx.lineWidth=2;
      ctx.beginPath(); ctx.roundRect(activeCard.x,activeCard.y-60,activeCard.w,72,3); ctx.stroke();
      ngl(); ctx.restore();
    }
    drawProgressBar();
    drawHud(rm);
  }

  if(alpha<1){ ctx.fillStyle=`rgba(0,0,0,${1-alpha})`; ctx.fillRect(0,0,W,H); }

  ctx.restore();

  // Show fire button only when weapon is active in playground
  const _fb = document.getElementById('btn-fire');
  if(_fb){ if(curRoom==='playground'&&pg.hasWeapon) _fb.classList.add('visible'); else _fb.classList.remove('visible'); }
}

// ══════════════════════════════════════════════════════════════ NAV ══════
function jumpTo(roomId){
  document.getElementById('end-overlay').classList.remove('show');
  showEnd=false;
  curRoom=roomId; resetP(60,380); alpha=0;
  if(roomId==='playground') resetPlayground();
}

loop();
</script>
